<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Night Just For Us</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@300;400&family=Montserrat:wght@200;300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #c9a96e;
    --gold-light: #e8d5a3;
    --cream: #f5f0e8;
    --deep-navy: #03060f;
    --midnight: #070d1a;
    --soft-white: rgba(255,255,255,0.85);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--deep-navy);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    overflow-x: hidden;
    cursor: default;
  }

  /* ── CANVAS STARS ── */
  #starfield {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ── SHOOTING STARS ── */
  .shooting-star {
    position: fixed;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    z-index: 1;
    pointer-events: none;
    opacity: 0;
  }
  .shooting-star::after {
    content: '';
    position: absolute;
    top: 50%; right: 0;
    transform: translateY(-50%);
    width: 120px; height: 1px;
    background: linear-gradient(to left, rgba(255,255,255,0.8), transparent);
  }

  /* ── SECTIONS ── */
  section {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 40px;
  }

  /* ── SECTION 1: INNOCENT OPENING ── */
  #section-intro {
    text-align: center;
  }
  #section-intro .eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.4em;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 1.2s ease forwards 0.5s;
  }
  #section-intro h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.5rem, 6vw, 5rem);
    font-weight: 300;
    font-style: italic;
    color: var(--cream);
    line-height: 1.2;
    margin-top: 20px;
    opacity: 0;
    animation: fadeUp 1.4s ease forwards 0.9s;
  }
  #section-intro .subtitle {
    font-size: 1.1rem;
    font-weight: 300;
    color: rgba(245,240,232,0.5);
    margin-top: 24px;
    letter-spacing: 0.1em;
    opacity: 0;
    animation: fadeUp 1.4s ease forwards 1.3s;
  }
  .scroll-hint {
    position: absolute;
    bottom: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    opacity: 0;
    animation: fadeUp 1.2s ease forwards 2.2s;
  }
  .scroll-hint span {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.35em;
    color: var(--gold);
    text-transform: uppercase;
  }
  .scroll-line {
    width: 1px; height: 50px;
    background: linear-gradient(to bottom, var(--gold), transparent);
    animation: scrollPulse 2s ease-in-out infinite;
  }

  /* ── DIVIDER ── */
  .divider {
    width: 1px;
    height: 120px;
    background: linear-gradient(to bottom, transparent, var(--gold), transparent);
    margin: 0 auto;
  }

  /* ── SECTION 2: MEMORIES ── */
  #section-memories {
    padding: 100px 40px;
  }
  .memories-header {
    text-align: center;
    margin-bottom: 80px;
  }
  .memories-header .eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.45em;
    color: var(--gold);
    text-transform: uppercase;
  }
  .memories-header h2 {
    font-size: clamp(2rem, 4vw, 3.5rem);
    font-weight: 300;
    font-style: italic;
    margin-top: 16px;
    color: var(--cream);
  }

  .constellation-wrap {
    position: relative;
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
  }

  .memory-item {
    display: grid;
    grid-template-columns: 1fr 80px 1fr;
    align-items: center;
    margin-bottom: 60px;
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.9s ease, transform 0.9s ease;
  }
  .memory-item.visible { opacity: 1; transform: translateY(0); }
  .memory-item.right .memory-text { grid-column: 3; grid-row: 1; text-align: left; }
  .memory-item.right .memory-star { grid-column: 2; grid-row: 1; }
  .memory-item.right .memory-photo { grid-column: 1; grid-row: 1; }
  .memory-item.left .memory-text { grid-column: 1; text-align: right; }
  .memory-item.left .memory-star { grid-column: 2; }
  .memory-item.left .memory-photo { grid-column: 3; }

  .memory-text { padding: 0 30px; }
  .memory-text .date {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.4em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .memory-text h3 {
    font-size: 1.6rem;
    font-weight: 300;
    font-style: italic;
    color: var(--cream);
    margin-bottom: 10px;
  }
  .memory-text p {
    font-size: 1rem;
    font-weight: 300;
    color: rgba(245,240,232,0.6);
    line-height: 1.8;
  }

  .memory-star {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .star-node {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: radial-gradient(circle, #fff 0%, var(--gold-light) 40%, transparent 70%);
    box-shadow: 0 0 12px 4px rgba(201,169,110,0.5), 0 0 30px 8px rgba(201,169,110,0.2);
    position: relative;
    z-index: 2;
    flex-shrink: 0;
  }
  .star-line {
    position: absolute;
    width: 1px;
    background: linear-gradient(to bottom, var(--gold), transparent);
    top: 14px;
    bottom: -74px;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0.4;
  }

  .memory-photo {
    width: 100%;
    max-width: 260px;
    aspect-ratio: 4/3;
    border-radius: 2px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,169,110,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .memory-item.right .memory-photo { justify-self: end; }
  .memory-item.left .memory-photo { justify-self: start; }
  .memory-photo img {
    width: 100%; height: 100%;
    object-fit: cover;
    filter: brightness(0.85) sepia(0.15);
    transition: filter 0.4s;
  }
  .memory-photo img:hover { filter: brightness(0.95) sepia(0); }
  .memory-photo .photo-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    color: rgba(201,169,110,0.5);
  }
  .memory-photo .photo-placeholder svg { width: 32px; height: 32px; }
  .memory-photo .photo-placeholder span {
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }
  .memory-photo::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,169,110,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 1;
  }

  /* ── MEMORY ZOOM OVERLAY ── */
  #memory-zoom {
    position: fixed;
    inset: 0;
    z-index: 900;
    background: rgba(3,6,15,0.0);
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    transition: background 0.8s ease;
  }
  #memory-zoom.active {
    background: rgba(3,6,15,0.92);
    pointer-events: all;
  }
  #memory-zoom-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    max-width: min(700px, 92vw);
    width: 100%;
    opacity: 0;
    transform: scale(0.88);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  #memory-zoom.active #memory-zoom-inner {
    opacity: 1;
    transform: scale(1);
  }
  #memory-zoom-img {
    width: 100%;
    max-height: 55vh;
    object-fit: cover;
    border-radius: 2px;
    border: 1px solid rgba(201,169,110,0.25);
    filter: brightness(0.92) sepia(0.1);
    box-shadow: 0 0 80px rgba(201,169,110,0.12), 0 40px 80px rgba(0,0,0,0.6);
  }
  #memory-zoom-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    font-weight: 300;
    font-style: italic;
    color: var(--cream);
    text-align: center;
    line-height: 1.3;
  }
  #memory-zoom-text {
    font-size: 1.05rem;
    font-weight: 300;
    color: rgba(245,240,232,0.6);
    text-align: center;
    line-height: 1.9;
    max-width: 500px;
  }
  #memory-zoom-num {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.5em;
    color: var(--gold);
    text-transform: uppercase;
  }
  /* gold shimmer line under title */
  #memory-zoom-line {
    width: 60px; height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: -20px auto 0;
  }

  /* ── SECTION 3: BRIDGE TEXT ── */
  #section-bridge {
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .bridge-text {
    max-width: 600px;
    margin: 0 auto;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 1s ease, transform 1s ease;
  }
  .bridge-text.visible { opacity: 1; transform: translateY(0); }
  .bridge-text p {
    font-size: clamp(1.2rem, 2.5vw, 1.8rem);
    font-weight: 300;
    font-style: italic;
    line-height: 1.9;
    color: rgba(245,240,232,0.75);
  }
  .bridge-text p em {
    color: var(--gold-light);
    font-style: italic;
  }

  /* ── SECTION 4: THE RING CONSTELLATION ── */
  #section-ring {
    text-align: center;
    position: relative;
  }
  #ring-canvas {
    width: min(500px, 90vw);
    height: min(500px, 90vw);
    margin: 0 auto 60px;
  }
  .ring-reveal-text {
    opacity: 0;
    transform: scale(0.9);
    transition: opacity 1.2s ease, transform 1.2s ease;
  }
  .ring-reveal-text.visible { opacity: 1; transform: scale(1); }
  .ring-reveal-text .eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.5em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .ring-reveal-text h2 {
    font-size: clamp(2.4rem, 4.5vw, 3.4rem);
    font-weight: 300;
    font-style: italic;
    color: var(--cream);
    margin-bottom: 18px;
  }
  .ring-reveal-text p {
    font-size: 1.05rem;
    font-weight: 300;
    line-height: 1.9;
    color: rgba(245,240,232,0.7);
    max-width: 540px;
    margin: 0 auto;
  }

  /* ── SECTION 5: THE PROPOSAL ── */
  #section-proposal {
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .proposal-inner {
    max-width: 700px;
    margin: 0 auto;
    position: relative;
    z-index: 2;
  }
  .proposal-eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.5em;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 1s ease 0.2s, transform 1s ease 0.2s;
  }
  .proposal-eyebrow.visible { opacity: 1; transform: translateY(0); }
  .proposal-question {
    font-size: clamp(3rem, 8vw, 7rem);
    font-weight: 300;
    font-style: italic;
    color: var(--cream);
    line-height: 1.1;
    margin: 30px 0 20px;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 1.2s ease 0.6s, transform 1.2s ease 0.6s;
  }
  .proposal-question.visible { opacity: 1; transform: translateY(0); }
  .proposal-name {
    font-size: clamp(3.5rem, 9vw, 8rem);
    font-weight: 300;
    font-style: italic;
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--cream));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 1.4s ease 1s, transform 1.4s ease 1s;
  }
  .proposal-name.visible { opacity: 1; transform: translateY(0); }
  .proposal-message {
    font-size: 1.1rem;
    font-weight: 300;
    line-height: 1.9;
    color: rgba(245,240,232,0.65);
    margin-top: 50px;
    max-width: 520px;
    margin-left: auto;
    margin-right: auto;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 1.2s ease 1.6s, transform 1.2s ease 1.6s;
  }
  .proposal-message.visible { opacity: 1; transform: translateY(0); }
  .proposal-signature {
    font-size: 1.8rem;
    font-style: italic;
    font-weight: 300;
    color: var(--gold-light);
    margin-top: 50px;
    opacity: 0;
    transition: opacity 1.2s ease 2.2s;
  }
  .proposal-signature.visible { opacity: 1; }

  /* ring emoji glowing */
  .ring-emoji {
    font-size: 4rem;
    display: block;
    margin: 40px auto 0;
    opacity: 0;
    filter: drop-shadow(0 0 20px rgba(201,169,110,0.8));
    animation: none;
    transition: opacity 1s ease 2.6s;
  }
  .ring-emoji.visible {
    opacity: 1;
    animation: ringFloat 3s ease-in-out infinite 3.5s;
  }

  /* confetti burst on proposal */
  .petal {
    position: fixed;
    width: 6px; height: 10px;
    border-radius: 50% 50% 0 50%;
    opacity: 0;
    pointer-events: none;
    z-index: 100;
    animation: petalFall linear forwards;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes scrollPulse {
    0%, 100% { opacity: 0.4; transform: scaleY(1); }
    50%       { opacity: 1;   transform: scaleY(1.15); }
  }
  @keyframes ringFloat {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50%       { transform: translateY(-14px) rotate(5deg); }
  }
  @keyframes petalFall {
    0%   { opacity: 1; transform: translateY(0) rotate(0deg) translateX(0); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg) translateX(var(--dx)); }
  }
  @keyframes twinkle {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  /* ── GLOW ORB ── */
  .glow-orb {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }

  /* ── START OVERLAY ── */
  #start-overlay {
    position: fixed;
    inset: 0;
    z-index: 999;
    background: var(--deep-navy);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    transition: opacity 1.2s ease;
  }
  #start-overlay.fade-out { opacity: 0; pointer-events: none; }
  #start-overlay .overlay-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    font-style: italic;
    font-weight: 300;
    color: var(--cream);
    text-align: center;
    line-height: 1.5;
    max-width: 480px;
    padding: 0 30px;
  }
  #start-overlay .overlay-sub {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.4em;
    color: rgba(201,169,110,0.6);
    text-transform: uppercase;
  }
  #start-btn {
    margin-top: 10px;
    padding: 16px 48px;
    border: 1px solid var(--gold);
    background: transparent;
    color: var(--gold-light);
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 0;
    transition: background 0.3s, color 0.3s;
    position: relative;
    overflow: hidden;
  }
  #start-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.35s ease;
    z-index: -1;
  }
  #start-btn:hover::before { transform: scaleX(1); }
  #start-btn:hover { color: var(--deep-navy); }

  /* ── MUSIC BUTTON ── */
  #music-btn {
    position: fixed;
    bottom: 28px;
    right: 28px;
    z-index: 500;
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1px solid rgba(201,169,110,0.5);
    background: rgba(3,6,15,0.75);
    backdrop-filter: blur(8px);
    color: var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.3s, box-shadow 0.3s;
    opacity: 0;
    pointer-events: none;
  }
  #music-btn.show { opacity: 1; pointer-events: all; }
  #music-btn:hover { border-color: var(--gold); box-shadow: 0 0 16px rgba(201,169,110,0.3); }
  #music-btn svg { width: 18px; height: 18px; }

  /* ── SCROLL PROGRESS ── */
  #scroll-progress {
    position: fixed;
    top: 0; left: 0;
    height: 2px;
    background: linear-gradient(to right, var(--gold), var(--gold-light));
    z-index: 998;
    width: 0%;
    transition: width 0.3s ease;
    box-shadow: 0 0 8px rgba(201,169,110,0.6);
  }

  /* ── RESPONSIVE (original) ── */
  @media (max-width: 700px) {
    .memory-item {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto auto;
      gap: 20px;
    }
    .memory-item.right .memory-text,
    .memory-item.left .memory-text { grid-column: 1; grid-row: 3; text-align: center; }
    .memory-item.right .memory-star,
    .memory-item.left .memory-star { grid-column: 1; grid-row: 1; }
    .memory-item.right .memory-photo,
    .memory-item.left .memory-photo { grid-column: 1; grid-row: 2; justify-self: center; max-width: 300px; width: 100%; }
    .star-line { display: none; }
  }

  /* ── MOBILE TWEAKS (added) ── */
  @media (max-width: 768px) {
    section {
      padding: 60px 20px;
    }

    .memory-item {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto auto;
      row-gap: 24px;
      text-align: center;
    }
    .memory-item.right .memory-text,
    .memory-item.left .memory-text {
      grid-column: 1;
      text-align: center;
      padding: 0 10px;
    }
    .memory-item.right .memory-photo,
    .memory-item.left .memory-photo {
      grid-column: 1;
      justify-self: center;
    }
    .memory-item.right .memory-star,
    .memory-item.left .memory-star {
      grid-column: 1;
      order: -1;
    }

    .memory-photo {
      max-width: 220px;
    }

    #section-intro h1 {
      font-size: 2.2rem;
    }
    #section-intro .subtitle {
      font-size: 0.9rem;
      padding: 0 10px;
    }

    .bridge-text p,
    .proposal-message {
      font-size: 1rem;
      padding: 0 10px;
    }

    .proposal-question {
      font-size: 2.4rem;
    }
    .proposal-name {
      font-size: 2.8rem;
    }

    #ring-canvas {
      width: 90vw;
      height: 90vw;
      margin-bottom: 40px;
    }

    #start-overlay .overlay-title {
      padding: 0 20px;
      font-size: 1.4rem;
    }
  }

  @media (max-width: 480px) {
    section {
      padding: 50px 16px;
    }

    .scroll-hint {
      bottom: 20px;
    }

    .memory-photo {
      max-width: 190px;
    }

    #music-btn {
      bottom: 18px;
      right: 18px;
      width: 42px;
      height: 42px;
    }
  }
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<!-- SCROLL PROGRESS -->
<div id="scroll-progress"></div>

<!-- START OVERLAY -->
<div id="start-overlay">
  <p class="overlay-sub">A message from Ali</p>
  <p class="overlay-title">I made something for you,<br>Tota — sit back and enjoy ✦</p>
  <button id="start-btn">Begin ✦</button>
</div>

<!-- MEMORY ZOOM OVERLAY -->
<div id="memory-zoom">
  <div id="memory-zoom-inner">
    <p id="memory-zoom-num"></p>
    <img id="memory-zoom-img" src="" alt="">
    <div id="memory-zoom-line"></div>
    <p id="memory-zoom-title"></p>
    <p id="memory-zoom-text"></p>
  </div>
</div>

<!-- MUSIC TOGGLE -->
<button id="music-btn" title="Toggle music">
  <svg id="music-icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
    <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
